name: Validate

on:
  push:
#    paths:
#      - GUI/Types/Renderer/Shaders/**

permissions:
  actions: write
  contents: write

jobs:
  validate:
    runs-on: windows-latest
    steps:

    - name: Pull code
      uses: actions/checkout@v3

    - name: Set up OpenGL Software Drivers system-wide
      uses: ssciwr/setup-mesa-dist-win@v2

    - name: Validate
      run: dotnet run --project Misc/ShaderValidator
